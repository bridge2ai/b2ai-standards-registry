# Main workflow

name: Build and test b2ai-standards-registry

on:
  push:
    branches:
      - main
  pull_request:

env:
  FORCE_COLOR: "1"

permissions: {}

jobs:
  qa:
    name: Schema and Tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]

    steps:
      #----------------------------------------------
      #       check-out repo and set-up python
      #----------------------------------------------
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      #----------------------------------------------
      #          install & configure poetry
      #----------------------------------------------
      - name: Install Poetry
        # using a fallback option because the snok/install-poetry action
        # seems to be having issues
        run: |
          python -m pip install --upgrade pip
          pip install poetry
        # uses: snok/install-poetry@v1

      #----------------------------------------------
      # install dependencies if cache does not exist
      #----------------------------------------------
      - name: Install dependencies
        run: poetry install --no-interaction --all-extras

      #----------------------------------------------
      #    Lint schema
      #----------------------------------------------
      - name: Run linkml-lint on schema
        run: make lint

      #----------------------------------------------
      #    Validate data
      #----------------------------------------------
      - name: Run linkml-validate on data
        run: make validate

      #----------------------------------------------
      #    Run tests
      #----------------------------------------------
      - name: Run tests
        run: make test

  precommit_hooks:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        cmd:
          - "check-added-large-files"
          - "detect-private-key"
          - "trailing-whitespace"
          - "end-of-file-fixer"
          - "mixed-line-ending"
          - "check-merge-conflict"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - uses: pre-commit/action@v3.0.1
        with:
          extra_args: ${{ matrix.cmd }} --all-files
